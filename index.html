<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IELTS Ultimate</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#141e30,#243b55);
  color:white;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1 {text-align:center;}

.card {
  background: rgba(255,255,255,0.1);
  padding:20px;
  border-radius:12px;
  margin-top:20px;
  animation: fade 1s;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#ff9800;
  color:white;
}

.timer {
  text-align:right;
  color:#ff4d4d;
  font-weight:bold;
}

@keyframes fade {
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1;}
}
</style>
</head>

<body>

<div class="container">

<h1>IELTS Reading Ultimate</h1>
<div class="timer" id="timer">25:00</div>

<div id="content"></div>

<button onclick="next()">Next</button>
<button onclick="finish()">Finish Test</button>

<h2 id="result"></h2>

</div>

<script>

// 📚 PASSAGES
const sets = [

[
{
text:`Climate change is a global issue... (passage 1 short demo)`,
q:[
{t:"tf",q:"Climate change is human-caused.",a:"True"},
{t:"gap",q:"It affects ___ levels.",a:"sea"}
]
},
{
text:`Technology has transformed communication...`,
q:[
{t:"tf",q:"Letters are still main.",a:"False"},
{t:"mc",q:"Main tool today?",o:["Letters","Social media","Smoke"],a:"Social media"}
]
},
{
text:`Education is essential for development...`,
q:[
{t:"tf",q:"Education is useless.",a:"False"},
{t:"gap",q:"It helps ___ growth.",a:"personal"}
]
}
],

[
{
text:`Artificial intelligence is rapidly growing...`,
q:[
{t:"tf",q:"AI has no risks.",a:"False"},
{t:"gap",q:"AI improves ___",a:"productivity"}
]
},
{
text:`Globalization connects countries...`,
q:[
{t:"tf",q:"Countries are isolated.",a:"False"},
{t:"mc",q:"Effect?",o:["Connection","Isolation","Silence"],a:"Connection"}
]
},
{
text:`Health is influenced by lifestyle...`,
q:[
{t:"gap",q:"Healthy ___ is important.",a:"diet"},
{t:"tf",q:"Lifestyle affects health.",a:"True"}
]
}
]

];

let set = sets[Math.floor(Math.random()*sets.length)];
let current = 0;
let score = 0;
let total = 0;

// LOAD
function load(){
let p = set[current];
let html = `<div class="card">${p.text}</div>`;

p.q.forEach((q,i)=>{
total++;

if(q.t=="tf"){
html+=`<div class="card">${i+1}. ${q.q}<br>
<input type="radio" name="q${current}${i}" value="True">True
<input type="radio" name="q${current}${i}" value="False">False
<input type="radio" name="q${current}${i}" value="Not Given">Not Given
</div>`;
}

if(q.t=="gap"){
html+=`<div class="card">${i+1}. ${q.q}<br>
<input type="text" id="q${current}${i}">
</div>`;
}

if(q.t=="mc"){
html+=`<div class="card">${i+1}. ${q.q}<br>`;
q.o.forEach(opt=>{
html+=`<input type="radio" name="q${current}${i}" value="${opt}">${opt}<br>`;
});
html+=`</div>`;
}

});

document.getElementById("content").innerHTML = html;
}

// CHECK
function check(){
let p = set[current];
p.q.forEach((q,i)=>{
let user;

if(q.t=="gap"){
user=document.getElementById(`q${current}${i}`).value.toLowerCase();
}else{
let sel=document.querySelector(`input[name="q${current}${i}"]:checked`);
user=sel?sel.value:null;
}

if(user==q.a.toLowerCase()) score++;
});
}

// NEXT
function next(){
check();
current++;
if(current<set.length){
load();
}else{
finish();
}
}

// BAND SCORE
function band(score,total){
let p = score/total;

if(p>=0.9) return "9.0";
if(p>=0.8) return "8.0";
if(p>=0.7) return "7.0";
if(p>=0.6) return "6.0";
if(p>=0.5) return "5.0";
return "4.0";
}

// FINISH
function finish(){
check();

let b = band(score,total);

document.getElementById("content").innerHTML="";
document.getElementById("result").innerText=
`Score: ${score}/${total} | Band: ${b}`;

localStorage.setItem("lastScore", `${score}/${total} Band ${b}`);
}

// TIMER
let time=1500;
setInterval(()=>{
time--;
let m=Math.floor(time/60);
let s=time%60;
document.getElementById("timer").innerText=
m+":"+(s<10?"0":"")+s;

if(time<=0) finish();
},1000);

// START
load();

</script>

</body>
  </html>
