<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cambridge IELTS Pro</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}
.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}
h1 {
  text-align: center;
}
.timer {
  text-align: right;
  font-size: 24px;
  color: #f87171;
  font-weight: bold;
}
.card {
  background: rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 14px;
  margin-top: 20px;
  animation: fadeIn 0.8s ease;
}
.passage {
  max-height: 350px;
  overflow-y: auto;
  line-height: 1.7;
}
button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: orange;
  font-size: 16px;
  font-weight: bold;
}
input[type="text"], textarea {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}
label {
  display: block;
  margin-top: 5px;
}
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);} 
  to {opacity: 1; transform: translateY(0);} 
}
</style>
</head>
<body>
<div class="container">
  <h1>Cambridge IELTS Pro</h1>

  <div class="timer" id="timer">12:00</div>

  <div class="card">
    <h2 id="title"></h2>
    <div class="passage" id="passage"></div>
  </div>

  <div id="questions"></div>

  <button onclick="finishExam()">Finish Reading Exam</button>

  <div class="card" id="result" style="display:none;"></div>

  <div class="card" id="writing-section">
    <h2>IELTS Writing Task 2</h2>
    <p id="writing-prompt"></p>
    <textarea id="essay" rows="12" placeholder="Write your essay here..."></textarea>
    <p>Word Count: <span id="word-count">0</span></p>
    <div class="timer" id="writing-timer">40:00</div>
    <button onclick="submitEssay()">Submit Writing</button>
    <div id="writing-result"></div>
  </div>
</div>

<script>
const readings = [
{
 title: "Urban Farming",
 text: `Urban farming has emerged as a practical solution to food insecurity in densely populated cities, where traditional agricultural land is scarce and supply chains are often vulnerable to disruption. Rooftops, abandoned warehouses, balconies, and vertical gardens are increasingly being transformed into productive agricultural spaces capable of producing fruits, vegetables, and herbs within city boundaries. In Paris, for example, large-scale rooftop farms now supply local communities with fresh produce while simultaneously reducing transportation emissions associated with imported food. Supporters argue that urban agriculture strengthens local food systems, creates employment opportunities, promotes sustainability, and reconnects urban residents with food production. Furthermore, these initiatives can improve food security during economic or environmental crises by decentralizing supply networks. However, critics point out that limited space, high setup costs, and technical challenges may restrict productivity when compared with conventional farming. Despite these concerns, technological advancements such as hydroponics, aeroponics, and controlled-environment agriculture continue to improve efficiency and output. Environmental planners increasingly view urban farming as essential for future sustainable cities.`,
 questions: [
  {type:"tfng", q:"Urban farming can reduce transport emissions.", a:"True"},
  {type:"tfng", q:"Urban farming is always inexpensive.", a:"False"},
  {type:"tfng", q:"Paris has banned rooftop farming.", a:"False"},
  {type:"gap", q:"Urban farming improves local food ____.", a:"systems"},
  {type:"gap", q:"New technologies improve farming ____.", a:"efficiency"}
 ]
},
{
 title: "Artificial Intelligence Ethics",
 text: `Artificial intelligence is transforming industries worldwide by automating processes, analyzing vast datasets, and improving efficiency across healthcare, finance, transportation, and education. However, its rapid expansion has raised concerns regarding bias, accountability, and workforce disruption. Critics warn that flawed algorithms can reinforce inequality, while automation may replace certain jobs. Advocates argue that transparent design, regulation, and ethical oversight can mitigate these risks. As AI becomes increasingly integrated into daily life, balancing innovation with social responsibility remains a major global challenge.`,
 questions: [
  {type:"tfng", q:"AI may reinforce inequalities.", a:"True"},
  {type:"tfng", q:"AI has solved all social problems.", a:"False"},
  {type:"tfng", q:"All countries regulate AI identically.", a:"Not Given"},
  {type:"gap", q:"AI improves decision-making ____.", a:"efficiency"},
  {type:"gap", q:"Ethical systems require ____.", a:"transparency"}
 ]
}
];

let current = readings[Math.floor(Math.random() * readings.length)];

function loadExam() {
 document.getElementById("title").innerText = current.title;
 document.getElementById("passage").innerText = current.text;
 let html = "";
 current.questions.forEach((q, i) => {
   html += `<div class="card"><p>${i+1}. ${q.q}</p>`;
   if(q.type === "tfng") {
     html += `
       <label><input type="radio" name="q${i}" value="True"> True</label>
       <label><input type="radio" name="q${i}" value="False"> False</label>
       <label><input type="radio" name="q${i}" value="Not Given"> Not Given</label>
     `;
   } else {
     html += `<input type="text" id="q${i}">`;
   }
   html += `</div>`;
 });
 document.getElementById("questions").innerHTML = html;
}

function finishExam() {
 let score = 0;
 current.questions.forEach((q, i) => {
   let userAnswer;
   if(q.type === "gap") {
     userAnswer = document.getElementById(`q${i}`).value.trim().toLowerCase();
   } else {
     const selected = document.querySelector(`input[name="q${i}"]:checked`);
     userAnswer = selected ? selected.value : "";
   }
   if(userAnswer.toLowerCase() === q.a.toLowerCase()) score++;
 });

 let band = (score / current.questions.length >= 0.8) ? "8.0+" :
            (score / current.questions.length >= 0.6) ? "6.5+" :
            (score / current.questions.length >= 0.4) ? "5.5+" : "Below 5.0";

 const resultBox = document.getElementById("result");
 resultBox.style.display = "block";
 resultBox.innerHTML = `<h2>Reading Score: ${score}/${current.questions.length}</h2><h3>Estimated Band: ${band}</h3>`;
}

let time = 720;
const timer = setInterval(() => {
 time--;
 let minutes = Math.floor(time / 60);
 let seconds = time % 60;
 document.getElementById("timer").innerText = `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
 if(time <= 0) {
   clearInterval(timer);
   finishExam();
 }
}, 1000);

const writingPrompts = [
  "Some people believe technology makes life easier, while others think it creates more problems. Discuss both views and give your opinion.",
  "Many believe universities should focus on practical skills rather than theoretical knowledge. To what extent do you agree or disagree?",
  "Some people think governments should spend more money on public transport instead of roads. Discuss both views.",
  "In many countries, young people are leaving rural areas for cities. What are the causes and solutions?"
];

const selectedPrompt = writingPrompts[Math.floor(Math.random() * writingPrompts.length)];
document.getElementById("writing-prompt").innerText = selectedPrompt;

const essayBox = document.getElementById("essay");
essayBox.addEventListener("input", function() {
  let words = essayBox.value.trim().split(/\s+/).filter(Boolean).length;
  document.getElementById("word-count").innerText = words;
});

let writingTime = 2400;
const writingTimer = setInterval(function() {
  writingTime--;
  let m = Math.floor(writingTime / 60);
  let s = writingTime % 60;
  document.getElementById("writing-timer").innerText = m + ":" + (s < 10 ? "0" : "") + s;
  if (writingTime <= 0) {
    clearInterval(writingTimer);
    submitEssay();
  }
}, 1000);

function submitEssay() {
  let words = essayBox.value.trim().split(/\s+/).filter(Boolean).length;
  let band = words >= 250 ? "Estimated Writing Band: 6.5+" : "Estimated Writing Band: Below 6.0 (Minimum word count not reached)";
  document.getElementById("writing-result").innerHTML = `<h3>${band}</h3><p>Your response has been saved for practice.</p>`;
  localStorage.setItem("IELTS_WRITING", essayBox.value);
}

loadExam();
</script>
</body>
  </html>
