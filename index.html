<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IELTS PRO</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  padding:20px;
}
.container{
  max-width:800px;
  margin:auto;
}
.passage{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}
.question{
  margin:15px 0;
}
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#f59e0b;
  border:none;
  border-radius:8px;
  font-weight:bold;
}
.timer{
  color:red;
  float:right;
}
</style>
</head>

<body>

<div class="container">
<h2>IELTS Reading PRO</h2>
<div class="timer" id="timer">20:00</div>

<div id="content"></div>

<button onclick="check()">Finish Test</button>
</div>

<script>

let passages = [

{
text: `Climate change has become one of the most significant challenges facing humanity today. Scientists argue that rising global temperatures are largely the result of human activities such as burning fossil fuels and deforestation. These actions increase greenhouse gases, trapping heat in the atmosphere. While some people believe natural factors play a role, the majority of evidence supports human responsibility.`,

questions: [
{
q:"Global warming is mainly caused by humans.",
type:"tf",
answer:"true"
},
{
q:"All scientists agree natural causes are the main reason.",
type:"tf",
answer:"false"
},
{
q:"The text says greenhouse gases trap heat.",
type:"tf",
answer:"true"
},
{
q:"Fill: Burning ______ fuels increases temperature.",
type:"fill",
answer:"fossil"
}
]
},

{
text:`In recent years, online education has gained popularity worldwide. Many students prefer studying from home due to flexibility and lower costs. However, critics argue that online learning reduces face-to-face interaction, which is essential for developing communication skills.`,

questions:[
{
q:"Online education is becoming more popular.",
type:"tf",
answer:"true"
},
{
q:"It is more expensive than traditional education.",
type:"tf",
answer:"false"
},
{
q:"Fill: Online learning reduces ______ interaction.",
type:"fill",
answer:"face-to-face"
}
]
}

];

let current = passages[Math.floor(Math.random()*passages.length)];

function load(){
let html = `<div class="passage">${current.text}</div>`;

current.questions.forEach((q,i)=>{
if(q.type=="tf"){
html+=`
<div class="question">
<p>${i+1}. ${q.q}</p>
<label><input type="radio" name="q${i}" value="true"> True</label><br>
<label><input type="radio" name="q${i}" value="false"> False</label><br>
<label><input type="radio" name="q${i}" value="not"> Not Given</label>
</div>`;
}
else{
html+=`
<div class="question">
<p>${i+1}. ${q.q}</p>
<input type="text" id="q${i}">
</div>`;
}
});

document.getElementById("content").innerHTML = html;
}

function check(){
let score=0;

current.questions.forEach((q,i)=>{
if(q.type=="tf"){
let ans=document.querySelector(`input[name="q${i}"]:checked`);
if(ans && ans.value==q.answer) score++;
}else{
let val=document.getElementById("q"+i).value.toLowerCase();
if(val==q.answer) score++;
}
});

alert("Score: "+score+" / "+current.questions.length);
}

load();

</script>

</body>
</html>
