<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Galaktika Hujumi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Share+Tech+Mono&display=swap');

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; background: #05070C;
    font-family: 'Share Tech Mono', monospace;
    touch-action: none; user-select: none;
  }
  #game { display: block; position: fixed; inset: 0; background: #05070C; z-index: 1; }

  .scanlines {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,229,255,0.035) 0px,
      rgba(0,229,255,0.035) 1px,
      transparent 1px,
      transparent 3px
    );
    mix-blend-mode: screen;
  }

  .icon-btn {
    position: fixed; top: 10px; right: 10px; z-index: 6;
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(20,28,51,0.85); border: 1px solid #2A3655;
    color: #E8F1FF; font-size: 15px;
    display: none; align-items: center; justify-content: center;
    cursor: pointer;
  }

  .overlay {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(10,17,40,0.97) 0%, rgba(5,7,12,0.99) 100%);
    padding: 24px; text-align: center; overflow-y: auto;
  }

  .screen-panel {
    position: fixed; inset: 0; z-index: 10;
    background: radial-gradient(ellipse at center, rgba(10,17,40,0.99) 0%, rgba(5,7,12,1) 100%);
    padding: 16px; overflow-y: auto;
    display: none; flex-direction: column;
  }
  .screen-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 8px; }
  .screen-title { font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: 19px; color: #E8F1FF; letter-spacing: 0.05em; margin: 0; }
  .back-btn {
    width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
    background: rgba(20,28,51,0.8); border: 1px solid #2A3655;
    color: #E8F1FF; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  .title {
    font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 36px; line-height: 1.15;
    color: #00E5FF; letter-spacing: 0.04em; margin: 0 0 10px;
    text-shadow: 0 0 20px rgba(0,229,255,0.6), 0 0 48px rgba(0,229,255,0.3);
  }
  .title-sm {
    font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: 21px;
    color: #FF2E63; letter-spacing: 0.05em; margin: 0 0 20px;
    text-shadow: 0 0 20px rgba(255,46,99,0.6);
  }
  .tagline { color: #7C93C7; font-size: 12px; margin: 0 0 16px; }

  .coin-display {
    font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 15px;
    color: #FFB800; margin-bottom: 18px;
    display: flex; align-items: center; gap: 6px; justify-content: center;
  }

  .btn-primary {
    font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 15px;
    letter-spacing: 0.08em; color: #05070C; background: #00E5FF;
    border: none; border-radius: 4px; padding: 14px 38px; cursor: pointer;
    box-shadow: 0 0 24px rgba(0,229,255,0.5);
  }
  .btn-primary:active { transform: scale(0.97); }
  .btn-ghost {
    font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 13px;
    letter-spacing: 0.06em; color: #A9BCE0; background: transparent;
    border: 1px solid #2A3655; border-radius: 4px; padding: 12px 28px;
    cursor: pointer;
  }
  .btn-col { display: flex; flex-direction: column; gap: 10px; align-items: center; }

  .stats { display: flex; gap: 20px; margin-bottom: 18px; flex-wrap: wrap; justify-content: center; }
  .stats > div { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .stat-label { font-size: 11px; letter-spacing: 0.15em; color: #7C93C7; }
  .stat-value { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 700; color: #FFB800; }

  .skin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding-bottom: 24px; }
  .skin-card {
    background: #141C33; border: 1px solid #2A3655; border-radius: 10px;
    padding: 8px 6px; display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; position: relative;
  }
  .skin-card.equipped { border-color: #00E5FF; box-shadow: 0 0 12px rgba(0,229,255,0.4); }
  .skin-card.locked { opacity: 0.5; }
  .skin-name { font-size: 10px; color: #E8F1FF; text-align: center; line-height: 1.2; min-height: 24px; }
  .skin-price { font-size: 11px; font-family: 'Orbitron', sans-serif; font-weight: 700; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }
  .shake { animation: shake 0.3s ease; }

  .upgrade-row { background: #141C33; border: 1px solid #2A3655; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
  .upgrade-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .upgrade-name { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 14px; color: #E8F1FF; }
  .upgrade-level { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: #7C93C7; }
  .upgrade-desc { font-size: 11px; color: #7C93C7; margin-bottom: 10px; }
  .upgrade-pips { display: flex; gap: 5px; margin-bottom: 12px; }
  .pip { width: 20px; height: 8px; border-radius: 3px; background: #232C42; }
  .pip.filled { background: #00E5FF; box-shadow: 0 0 6px rgba(0,229,255,0.5); }
  .upgrade-buy-btn {
    width: 100%; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 12px;
    padding: 10px; border-radius: 6px; border: none; cursor: pointer;
    background: #14B8A6; color: #04211E;
  }
  .upgrade-buy-btn.disabled { background: #232C42; color: #5C6C8C; }
  .upgrade-buy-btn.maxed { background: #FFB800; color: #2B1600; }
</style>
</head>
<body>

<canvas id="game"></canvas>
<div class="scanlines"></div>
<button id="pause-btn" class="icon-btn">⏸</button>

<div id="start-screen" class="overlay">
  <h1 class="title">GALAKTIKA<br>HUJUMI</h1>
  <p class="tagline">Suring, kema o'zi otadi — galaktikani himoya qiling</p>
  <div class="coin-display"><span>🪙</span><span class="coin-balance-value">0</span></div>
  <div class="btn-col">
    <button id="start-btn" class="btn-primary">BOSHLASH</button>
    <button id="skins-btn" class="btn-ghost">KEMALAR</button>
    <button id="upgrades-btn" class="btn-ghost">YAXSHILASH</button>
  </div>
</div>

<div id="skins-screen" class="screen-panel">
  <div class="screen-header">
    <button class="back-btn" id="skins-back-btn">←</button>
    <h2 class="screen-title">KEMALAR</h2>
    <div class="coin-display" style="margin-bottom:0;"><span>🪙</span><span class="coin-balance-value">0</span></div>
  </div>
  <div class="skin-grid" id="skin-grid"></div>
</div>

<div id="upgrades-screen" class="screen-panel">
  <div class="screen-header">
    <button class="back-btn" id="upgrades-back-btn">←</button>
    <h2 class="screen-title">YAXSHILASH</h2>
    <div class="coin-display" style="margin-bottom:0;"><span>🪙</span><span class="coin-balance-value">0</span></div>
  </div>
  <div id="upgrade-list"></div>
</div>

<div id="pause-screen" class="overlay" style="display:none;">
  <h2 class="title-sm" style="color:#00E5FF; text-shadow:0 0 20px rgba(0,229,255,0.6);">TO'XTATILDI</h2>
  <div class="btn-col">
    <button id="resume-btn" class="btn-primary">DAVOM ETISH</button>
    <button id="pause-restart-btn" class="btn-ghost">QAYTA BOSHLASH</button>
    <button id="pause-menu-btn" class="btn-ghost">BOSH MENYU</button>
  </div>
</div>

<div id="gameover-screen" class="overlay" style="display:none;">
  <h2 class="title-sm">KEMA HALOK BO'LDI</h2>
  <div class="stats">
    <div><span class="stat-label">BALL</span><span class="stat-value" id="final-score">0</span></div>
    <div><span class="stat-label">REKORD</span><span class="stat-value" id="final-best">0</span></div>
    <div><span class="stat-label">TO'LQIN</span><span class="stat-value" id="final-wave">1</span></div>
  </div>
  <div class="coin-display">🪙 Bu safar: <span id="final-coins">0</span></div>
  <div class="btn-col">
    <button id="retry-btn" class="btn-primary">QAYTA URINISH</button>
    <button id="gameover-menu-btn" class="btn-ghost">BOSH MENYU</button>
  </div>
</div>

<script>
  var COLORS = {
    voidC: '#05070C', spaceDeep: '#0A1128', nebula: '#2D1B4E',
    playerCyan: '#00E5FF', enemyMagenta: '#FF2E63', enemyMagentaDim: '#B0184A',
    warningAmber: '#FFB800', starWhite: '#E8F1FF', hudLine: '#1C2B4A'
  };

  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  var W = 0, H = 0, DPR = 1;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = Math.floor(W * DPR); canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
  function dist(x1, y1, x2, y2) { return Math.hypot(x1 - x2, y1 - y2); }

  /* ---------------- persistence ---------------- */
  var SAVE_KEY = 'galaktikaHujumiSave_v1';
  var coins = 0, runCoins = 0, best = 0;
  var ownedSkins = [0];
  var equippedSkin = 0;
  var upgradeLevels = { fireRate: 0, damage: 0, hull: 0, control: 0 };

  function loadSave() {
    try {
      var raw = localStorage.getItem(SAVE_KEY);
      if (raw) {
        var data = JSON.parse(raw);
        if (typeof data.coins === 'number') coins = data.coins;
        if (Array.isArray(data.ownedSkins)) ownedSkins = data.ownedSkins;
        if (typeof data.equippedSkin === 'number') equippedSkin = data.equippedSkin;
        if (data.upgradeLevels) upgradeLevels = data.upgradeLevels;
        if (typeof data.best === 'number') best = data.best;
      }
    } catch (e) { /* storage unavailable, keep defaults */ }
    if (ownedSkins.indexOf(0) === -1) ownedSkins.push(0);
    if (ownedSkins.indexOf(equippedSkin) === -1) equippedSkin = 0;
    ['fireRate', 'damage', 'hull', 'control'].forEach(function (k) {
      if (typeof upgradeLevels[k] !== 'number') upgradeLevels[k] = 0;
    });
  }
  function saveGame() {
    try {
      localStorage.setItem(SAVE_KEY, JSON.stringify({
        coins: coins, ownedSkins: ownedSkins, equippedSkin: equippedSkin,
        upgradeLevels: upgradeLevels, best: best
      }));
    } catch (e) { /* ignore if unavailable */ }
  }
  function renderCoinDisplays() {
    var els = document.querySelectorAll('.coin-balance-value');
    for (var i = 0; i < els.length; i++) els[i].textContent = coins;
  }

  /* ---------------- ship shapes & skins ---------------- */
  function drawShipPath(c, shape, r) {
    c.beginPath();
    if (shape === 'twinfin') {
      c.moveTo(0, -r);
      c.lineTo(r * 0.5, -r * 0.1);
      c.lineTo(r * 1.15, r * 0.9);
      c.lineTo(r * 0.35, r * 0.55);
      c.lineTo(0, r * 0.9);
      c.lineTo(-r * 0.35, r * 0.55);
      c.lineTo(-r * 1.15, r * 0.9);
      c.lineTo(-r * 0.5, -r * 0.1);
      c.closePath();
    } else if (shape === 'stealth') {
      c.moveTo(0, -r * 1.1);
      c.lineTo(r * 0.9, r * 0.6);
      c.lineTo(r * 0.3, r * 0.3);
      c.lineTo(0, r * 0.75);
      c.lineTo(-r * 0.3, r * 0.3);
      c.lineTo(-r * 0.9, r * 0.6);
      c.closePath();
    } else if (shape === 'orb') {
      c.arc(0, -r * 0.05, r * 0.72, 0, Math.PI * 2);
      c.moveTo(0, r * 0.95);
      c.lineTo(r * 0.4, r * 0.35);
      c.lineTo(-r * 0.4, r * 0.35);
      c.closePath();
    } else if (shape === 'cross') {
      c.moveTo(0, -r);
      c.lineTo(r * 0.28, -r * 0.15);
      c.lineTo(r * 1.05, -r * 0.15);
      c.lineTo(r * 0.4, r * 0.25);
      c.lineTo(r * 0.65, r * 0.95);
      c.lineTo(0, r * 0.45);
      c.lineTo(-r * 0.65, r * 0.95);
      c.lineTo(-r * 0.4, r * 0.25);
      c.lineTo(-r * 1.05, -r * 0.15);
      c.lineTo(-r * 0.28, -r * 0.15);
      c.closePath();
    } else {
      c.moveTo(0, -r);
      c.lineTo(r * 0.8, r * 0.8);
      c.lineTo(0, r * 0.35);
      c.lineTo(-r * 0.8, r * 0.8);
      c.closePath();
    }
  }

  var SKINS = [
    { id: 0,  name: "Boshlang'ich",     shape: 'arrow',   color: '#00E5FF', price: 0 },
    { id: 1,  name: "Cho'g'",           shape: 'twinfin', color: '#FF8A00', price: 50 },
    { id: 2,  name: 'Zumrad',           shape: 'stealth', color: '#00FFA3', price: 60 },
    { id: 3,  name: 'Ametist',          shape: 'orb',     color: '#A855F7', price: 70 },
    { id: 4,  name: "Qorong'i",         shape: 'cross',   color: '#8A94A6', price: 80 },
    { id: 5,  name: 'Qip-qizil',        shape: 'arrow',   color: '#E11D48', price: 90 },
    { id: 6,  name: 'Muz',              shape: 'twinfin', color: '#7DD3FC', price: 100 },
    { id: 7,  name: 'Kumush',           shape: 'stealth', color: '#E5E7EB', price: 120 },
    { id: 8,  name: 'Neon Pushti',      shape: 'orb',     color: '#FF2E9A', price: 140 },
    { id: 9,  name: 'Radioaktiv',       shape: 'cross',   color: '#C4FF00', price: 160 },
    { id: 10, name: 'Kosmik Binafsha',  shape: 'arrow',   color: '#7C3AED', price: 180 },
    { id: 11, name: "Bo'ron",           shape: 'twinfin', color: '#64748B', price: 200 },
    { id: 12, name: 'Feniks',           shape: 'stealth', color: '#FF5A1F', price: 230 },
    { id: 13, name: 'Yulduz Changi',    shape: 'orb',     color: '#E0D7FF', price: 260 },
    { id: 14, name: 'Qora Tuynuk',      shape: 'cross',   color: '#5B21B6', price: 300 },
    { id: 15, name: 'Oltin Ajdaho',     shape: 'arrow',   color: '#FFD700', price: 340 },
    { id: 16, name: 'Buzilgan',         shape: 'twinfin', color: '#65A30D', price: 380 },
    { id: 17, name: 'Platina',          shape: 'stealth', color: '#F8FAFC', price: 420 },
    { id: 18, name: 'Galaktik Qirol',   shape: 'orb',     color: '#D946EF', price: 480 },
    { id: 19, name: 'Afsonaviy',        shape: 'cross',   color: 'RAINBOW', price: 600 }
  ];

  function currentShipShape() { return (SKINS[equippedSkin] || SKINS[0]).shape; }
  function currentShipColor() {
    var skin = SKINS[equippedSkin] || SKINS[0];
    if (skin.color === 'RAINBOW') return 'hsl(' + (Math.floor(performance.now() / 8) % 360) + ',90%,60%)';
    return skin.color;
  }

  function renderSkinGrid() {
    var grid = document.getElementById('skin-grid');
    grid.innerHTML = '';
    SKINS.forEach(function (skin) {
      var owned = ownedSkins.indexOf(skin.id) !== -1;
      var equipped = equippedSkin === skin.id;
      var afford = coins >= skin.price;

      var card = document.createElement('div');
      card.className = 'skin-card' + (equipped ? ' equipped' : '') + (!owned && !afford ? ' locked' : '');

      var cv = document.createElement('canvas');
      cv.width = 64; cv.height = 64;
      var cctx = cv.getContext('2d');
      cctx.save();
      cctx.translate(32, 36);
      if (skin.color === 'RAINBOW') {
        var grad = cctx.createLinearGradient(-20, -20, 20, 20);
        grad.addColorStop(0, '#FF2E63'); grad.addColorStop(0.33, '#FFB800');
        grad.addColorStop(0.66, '#00E5FF'); grad.addColorStop(1, '#C026D3');
        cctx.fillStyle = grad;
      } else {
        cctx.fillStyle = skin.color;
      }
      cctx.shadowColor = skin.color === 'RAINBOW' ? '#C026D3' : skin.color;
      cctx.shadowBlur = 8;
      drawShipPath(cctx, skin.shape, 17);
      cctx.fill();
      cctx.restore();
      card.appendChild(cv);

      var nameEl = document.createElement('div');
      nameEl.className = 'skin-name';
      nameEl.textContent = skin.name;
      card.appendChild(nameEl);

      var priceEl = document.createElement('div');
      priceEl.className = 'skin-price';
      if (equipped) { priceEl.textContent = 'TAQILGAN'; priceEl.style.color = '#00E5FF'; }
      else if (owned) { priceEl.textContent = 'TANLASH'; priceEl.style.color = '#7C93C7'; }
      else { priceEl.textContent = '🪙 ' + skin.price; priceEl.style.color = '#FFB800'; }
      card.appendChild(priceEl);

      card.addEventListener('click', function () {
        if (equipped) return;
        if (owned) {
          equippedSkin = skin.id;
          saveGame();
          renderSkinGrid();
        } else if (coins >= skin.price) {
          coins -= skin.price;
          ownedSkins.push(skin.id);
          equippedSkin = skin.id;
          saveGame();
          renderSkinGrid();
          renderCoinDisplays();
          playSound('powerup');
        } else {
          card.classList.add('shake');
          setTimeout(function () { card.classList.remove('shake'); }, 300);
        }
      });

      grid.appendChild(card);
    });
  }

  /* ---------------- upgrades ---------------- */
  var UPGRADE_DEFS = [
    { key: 'fireRate', name: "O'T TEZLIGI", desc: 'Kema tezroq otadi', maxLevel: 5, cost: [80, 150, 240, 350, 500] },
    { key: 'damage',   name: 'ZARAR',       desc: "Har bir o'q kuchliroq uradi", maxLevel: 5, cost: [100, 180, 280, 400, 550] },
    { key: 'hull',     name: 'KORPUS',      desc: 'Maksimal salomatlik oshadi', maxLevel: 5, cost: [70, 130, 200, 300, 420] },
    { key: 'control',  name: 'BOSHQARUV',   desc: 'Kema barmoqqa tezroq javob beradi', maxLevel: 5, cost: [60, 110, 170, 250, 350] }
  ];

  function renderUpgradeList() {
    var list = document.getElementById('upgrade-list');
    list.innerHTML = '';
    UPGRADE_DEFS.forEach(function (def) {
      var level = upgradeLevels[def.key] || 0;
      var maxed = level >= def.maxLevel;
      var cost = maxed ? null : def.cost[level];

      var row = document.createElement('div');
      row.className = 'upgrade-row';

      var top = document.createElement('div');
      top.className = 'upgrade-top';
      var nameEl = document.createElement('div');
      nameEl.className = 'upgrade-name';
      nameEl.textContent = def.name;
      var lvlEl = document.createElement('div');
      lvlEl.className = 'upgrade-level';
      lvlEl.textContent = level + '/' + def.maxLevel;
      top.appendChild(nameEl); top.appendChild(lvlEl);
      row.appendChild(top);

      var desc = document.createElement('div');
      desc.className = 'upgrade-desc';
      desc.textContent = def.desc;
      row.appendChild(desc);

      var pips = document.createElement('div');
      pips.className = 'upgrade-pips';
      for (var i = 0; i < def.maxLevel; i++) {
        var pip = document.createElement('div');
        pip.className = 'pip' + (i < level ? ' filled' : '');
        pips.appendChild(pip);
      }
      row.appendChild(pips);

      var btn = document.createElement('button');
      if (maxed) {
        btn.className = 'upgrade-buy-btn maxed';
        btn.textContent = 'ENG YUQORI DARAJA';
      } else if (coins < cost) {
        btn.className = 'upgrade-buy-btn disabled';
        btn.textContent = '🪙 ' + cost + ' KERAK';
      } else {
        btn.className = 'upgrade-buy-btn';
        btn.textContent = 'OSHIRISH — 🪙 ' + cost;
        btn.addEventListener('click', function () {
          coins -= cost;
          upgradeLevels[def.key] = level + 1;
          saveGame();
          renderUpgradeList();
          renderCoinDisplays();
          playSound('powerup');
        });
      }
      row.appendChild(btn);

      list.appendChild(row);
    });
  }

  /* ---------------- stars ---------------- */
  var stars = [];
  function initStars() {
    stars = [];
    for (var i = 0; i < 90; i++) {
      stars.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.6 + 0.4, speed: Math.random() * 40 + 20, tw: Math.random() * Math.PI * 2 });
    }
  }
  function updateStars(dt) {
    stars.forEach(function (s) {
      s.y += s.speed * dt; s.tw += dt * 3;
      if (s.y > H) { s.y = -2; s.x = Math.random() * W; }
    });
  }
  function drawStars() {
    stars.forEach(function (s) {
      ctx.globalAlpha = 0.6 + Math.sin(s.tw) * 0.4;
      ctx.fillStyle = COLORS.starWhite;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  /* ---------------- player ---------------- */
  var player;
  function initPlayer() {
    var fireLevel = upgradeLevels.fireRate || 0;
    var hullLevel = upgradeLevels.hull || 0;
    var maxHp = 100 + hullLevel * 20;
    player = {
      x: W / 2, y: H - 120, targetX: W / 2, targetY: H - 120,
      r: 16, hp: maxHp, maxHp: maxHp,
      fireTimer: 0, fireRate: 0.22 - fireLevel * 0.02,
      rapidTimer: 0, shieldTimer: 0, alive: true
    };
  }
  function updatePlayer(dt) {
    var lerpFactor = 8 + (upgradeLevels.control || 0) * 2.5;
    player.x += (player.targetX - player.x) * Math.min(dt * lerpFactor, 1);
    player.y += (player.targetY - player.y) * Math.min(dt * lerpFactor, 1);
    player.x = clamp(player.x, player.r, W - player.r);
    player.y = clamp(player.y, H * 0.35, H - player.r - 12);

    if (player.rapidTimer > 0) player.rapidTimer -= dt;
    if (player.shieldTimer > 0) player.shieldTimer -= dt;

    player.fireTimer -= dt;
    var rate = player.rapidTimer > 0 ? 0.09 : player.fireRate;
    if (player.fireTimer <= 0) { firePlayerBullet(); player.fireTimer = rate; }
  }
  function drawPlayer() {
    if (!player.alive) return;
    ctx.save();
    ctx.translate(player.x, player.y);

    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.ellipse(0, player.r * 0.9, 5, 10, 0, 0, Math.PI * 2);
    ctx.fill();

    if (player.shieldTimer > 0) {
      ctx.strokeStyle = 'rgba(0,229,255,0.7)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 0, player.r + 8, 0, Math.PI * 2); ctx.stroke();
    }

    var shipColor = currentShipColor();
    ctx.fillStyle = shipColor;
    ctx.shadowColor = shipColor;
    ctx.shadowBlur = 14;
    drawShipPath(ctx, currentShipShape(), player.r);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  /* ---------------- bullets ---------------- */
  var playerBullets = [];
  var enemyBullets = [];

  function firePlayerBullet() {
    var dmg = 1 + (upgradeLevels.damage || 0);
    playerBullets.push({ x: player.x, y: player.y - player.r, vx: 0, vy: -520, r: 3, dmg: dmg });
    if (player.rapidTimer > 0) {
      playerBullets.push({ x: player.x - 10, y: player.y, vx: -70, vy: -480, r: 2.5, dmg: dmg });
      playerBullets.push({ x: player.x + 10, y: player.y, vx: 70, vy: -480, r: 2.5, dmg: dmg });
    }
    playSound('shoot');
  }
  function updateBullets(dt) {
    playerBullets.forEach(function (b) { b.x += b.vx * dt; b.y += b.vy * dt; });
    enemyBullets.forEach(function (b) { b.x += b.vx * dt; b.y += b.vy * dt; });
  }
  function drawBullets() {
    ctx.fillStyle = COLORS.playerCyan;
    ctx.shadowColor = COLORS.playerCyan; ctx.shadowBlur = 8;
    playerBullets.forEach(function (b) { ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill(); });
    ctx.shadowBlur = 0;

    ctx.fillStyle = COLORS.enemyMagenta;
    ctx.shadowColor = COLORS.enemyMagenta; ctx.shadowBlur = 8;
    enemyBullets.forEach(function (b) { ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill(); });
    ctx.shadowBlur = 0;
  }

  /* ---------------- enemies ---------------- */
  var enemies = [];
  var bossActive = false;
  var ENEMY_TYPES = {
    drone:   { hp: 1, r: 14, speed: 70, score: 10, color: COLORS.enemyMagentaDim },
    zigzag:  { hp: 2, r: 15, speed: 90, score: 20, color: COLORS.enemyMagenta },
    shooter: { hp: 3, r: 17, speed: 55, score: 35, color: COLORS.warningAmber, shoots: true }
  };
  var COIN_VALUES = { drone: 1, zigzag: 2, shooter: 3 };

  function enemyColor(e) {
    if (e.isBoss) return COLORS.warningAmber;
    var t = ENEMY_TYPES[e.type];
    return t ? t.color : COLORS.enemyMagenta;
  }

  function spawnEnemy() {
    var types = ['drone'];
    if (wave >= 2) types.push('zigzag');
    if (wave >= 3) types.push('shooter');
    var type = types[Math.floor(Math.random() * types.length)];
    var base = ENEMY_TYPES[type];
    var hp = base.hp + Math.floor(wave / 4);
    enemies.push({
      type: type, x: Math.random() * (W - 60) + 30, y: -30, phase: Math.random() * Math.PI * 2,
      hp: hp, maxHp: hp, r: base.r, speed: base.speed + wave * 4,
      score: base.score, fireTimer: Math.random() * 2 + 1
    });
  }
  function spawnBoss() {
    bossActive = true;
    var hp = 40 + wave * 6;
    enemies.push({ type: 'boss', isBoss: true, x: W / 2, y: -80, vx: 60, hp: hp, maxHp: hp, r: 42, speed: 40, score: 300, fireTimer: 1.2 });
  }

  function updateEnemies(dt) {
    enemies.forEach(function (e) {
      if (e.type === 'zigzag') {
        e.phase += dt * 3;
        e.x += Math.sin(e.phase) * 90 * dt;
        e.y += e.speed * dt;
      } else if (e.isBoss) {
        if (e.y < 90) e.y += e.speed * dt;
        e.x += e.vx * dt;
        if (e.x < 50 || e.x > W - 50) e.vx *= -1;
        e.fireTimer -= dt;
        if (e.fireTimer <= 0 && e.y > 40) {
          for (var a = -1; a <= 1; a++) enemyBullets.push({ x: e.x, y: e.y + e.r, vx: a * 90, vy: 260, r: 4 });
          e.fireTimer = 1.1;
          playSound('enemyShoot');
        }
      } else {
        e.y += e.speed * dt;
        if (e.type === 'shooter') {
          e.fireTimer -= dt;
          if (e.fireTimer <= 0 && e.y > 0 && e.y < H * 0.7) {
            enemyBullets.push({ x: e.x, y: e.y + e.r, vx: 0, vy: 220, r: 3.5 });
            e.fireTimer = 1.8;
            playSound('enemyShoot');
          }
        }
      }
    });
  }

  function drawEnemies() {
    enemies.forEach(function (e) {
      ctx.save();
      ctx.translate(e.x, e.y);
      var color = enemyColor(e);
      ctx.fillStyle = color;
      ctx.shadowColor = color; ctx.shadowBlur = e.isBoss ? 22 : 10;

      if (e.isBoss) {
        ctx.beginPath();
        ctx.moveTo(0, -e.r * 0.6); ctx.lineTo(e.r, -e.r * 0.1); ctx.lineTo(e.r * 0.7, e.r * 0.8);
        ctx.lineTo(-e.r * 0.7, e.r * 0.8); ctx.lineTo(-e.r, -e.r * 0.1); ctx.closePath();
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.moveTo(0, e.r); ctx.lineTo(e.r * 0.8, -e.r * 0.7); ctx.lineTo(0, -e.r * 0.2);
        ctx.lineTo(-e.r * 0.8, -e.r * 0.7); ctx.closePath();
        ctx.fill();
      }
      ctx.shadowBlur = 0;

      if (e.maxHp > 1) {
        var w = e.r * 1.6;
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(-w / 2, -e.r - 10, w, 3);
        ctx.fillStyle = color;
        ctx.fillRect(-w / 2, -e.r - 10, w * (e.hp / e.maxHp), 3);
      }
      ctx.restore();
    });
  }

  /* ---------------- particles ---------------- */
  var particles = [];
  function spawnExplosion(x, y, count, color) {
    for (var i = 0; i < count; i++) {
      var angle = Math.random() * Math.PI * 2;
      var speed = Math.random() * 160 + 40;
      particles.push({ x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: Math.random() * 0.4 + 0.3, maxLife: 0.7, r: Math.random() * 3 + 1.5, color: color });
    }
  }
  function updateParticles(dt) {
    particles.forEach(function (p) { p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.94; p.vy *= 0.94; p.life -= dt; });
    particles = particles.filter(function (p) { return p.life > 0; });
  }
  function drawParticles() {
    particles.forEach(function (p) {
      ctx.globalAlpha = Math.max(p.life / p.maxLife, 0);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  /* ---------------- power-ups ---------------- */
  var powerUps = [];
  function maybeDropPowerUp(x, y) {
    if (Math.random() < 0.12) {
      var type = Math.random() < 0.5 ? 'shield' : 'rapid';
      powerUps.push({ x: x, y: y, vy: 70, type: type, phase: 0 });
    }
  }
  function updatePowerUps(dt) { powerUps.forEach(function (p) { p.y += p.vy * dt; p.phase += dt * 4; }); }
  function applyPowerUp(type) {
    if (type === 'shield') player.shieldTimer = 5;
    else if (type === 'rapid') player.rapidTimer = 6;
  }
  function drawPowerUps() {
    powerUps.forEach(function (p) {
      var bob = Math.sin(p.phase) * 3;
      ctx.save();
      ctx.translate(p.x, p.y + bob);
      var c = p.type === 'shield' ? COLORS.playerCyan : COLORS.warningAmber;
      ctx.fillStyle = c; ctx.shadowColor = c; ctx.shadowBlur = 12;
      ctx.beginPath(); ctx.arc(0, 0, 11, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#05070C';
      ctx.font = 'bold 13px "Share Tech Mono", monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(p.type === 'shield' ? 'S' : 'R', 0, 1);
      ctx.restore();
    });
  }

  /* ---------------- collisions ---------------- */
  var score = 0, screenShake = 0;

  function damagePlayer(amount) {
    if (!player.alive || player.shieldTimer > 0) return;
    player.hp -= amount;
    screenShake = 0.15;
    playSound('hit');
    if (player.hp <= 0) { player.hp = 0; player.alive = false; endGame(); }
  }

  function checkCollisions() {
    for (var i = enemies.length - 1; i >= 0; i--) {
      var e = enemies[i];
      for (var j = playerBullets.length - 1; j >= 0; j--) {
        var b = playerBullets[j];
        if (dist(e.x, e.y, b.x, b.y) < e.r + b.r) {
          playerBullets.splice(j, 1);
          e.hp -= b.dmg;
          if (e.hp <= 0) {
            score += e.score;
            var coinGain = e.isBoss ? 20 : (COIN_VALUES[e.type] || 1);
            coins += coinGain; runCoins += coinGain;
            spawnExplosion(e.x, e.y, e.isBoss ? 40 : 14, enemyColor(e));
            maybeDropPowerUp(e.x, e.y);
            playSound(e.isBoss ? 'bigExplosion' : 'explosion');
            if (e.isBoss) bossActive = false;
          }
          break;
        }
      }
    }
    enemies = enemies.filter(function (e) { return e.hp > 0; });

    if (player.alive && player.shieldTimer <= 0) {
      for (var k = enemies.length - 1; k >= 0; k--) {
        var en = enemies[k];
        if (dist(en.x, en.y, player.x, player.y) < en.r + player.r) {
          damagePlayer(en.isBoss ? 30 : 18);
          if (!en.isBoss) { en.hp = 0; spawnExplosion(en.x, en.y, 14, enemyColor(en)); playSound('explosion'); }
        }
      }
      enemies = enemies.filter(function (e) { return e.hp > 0; });
    }

    if (player.alive) {
      for (var m = enemyBullets.length - 1; m >= 0; m--) {
        var eb = enemyBullets[m];
        var hitR = player.shieldTimer > 0 ? player.r + 8 : player.r;
        if (dist(eb.x, eb.y, player.x, player.y) < hitR + eb.r) {
          enemyBullets.splice(m, 1);
          if (player.shieldTimer <= 0) damagePlayer(10);
        }
      }
    }

    for (var p = powerUps.length - 1; p >= 0; p--) {
      var pu = powerUps[p];
      if (dist(pu.x, pu.y, player.x, player.y) < player.r + 14) {
        applyPowerUp(pu.type);
        powerUps.splice(p, 1);
        playSound('powerup');
      }
    }
  }

  function cleanupOffscreen() {
    playerBullets = playerBullets.filter(function (b) { return b.y > -20 && b.x > -20 && b.x < W + 20; });
    enemyBullets = enemyBullets.filter(function (b) { return b.y < H + 20 && b.y > -20 && b.x > -20 && b.x < W + 20; });
    enemies = enemies.filter(function (e) { return e.y - e.r < H + 60; });
    powerUps = powerUps.filter(function (p) { return p.y < H + 40; });
  }

  /* ---------------- waves ---------------- */
  var wave = 1, waveTimer = 0, spawnTimer = 0;
  var waveAnnounceTimer = 0, waveAnnounceText = '';

  function updateWaveAndSpawning(dt) {
    if (waveAnnounceTimer > 0) waveAnnounceTimer = Math.max(0, waveAnnounceTimer - dt);
    if (bossActive) return;

    waveTimer += dt;
    spawnTimer -= dt;

    var spawnInterval = Math.max(1.1 - wave * 0.06, 0.35);
    if (spawnTimer <= 0) { spawnEnemy(); spawnTimer = spawnInterval; }

    if (waveTimer > 16) {
      waveTimer = 0;
      wave += 1;
      waveAnnounceTimer = 1.6;
      if (wave % 5 === 0) { waveAnnounceText = 'BOSS!'; spawnBoss(); }
      else { waveAnnounceText = "TO'LQIN " + wave; }
    }
  }

  /* ---------------- HUD ---------------- */
  function drawHUD() {
    ctx.fillStyle = 'rgba(10,17,40,0.55)';
    ctx.fillRect(0, 0, W, 62);
    ctx.strokeStyle = COLORS.hudLine;
    ctx.beginPath(); ctx.moveTo(0, 62); ctx.lineTo(W, 62); ctx.stroke();

    ctx.textBaseline = 'middle';
    ctx.font = '11px "Share Tech Mono", monospace';
    ctx.fillStyle = '#7C93C7';
    ctx.textAlign = 'left';
    ctx.fillText('BALL', 16, 14);

    ctx.font = 'bold 19px "Share Tech Mono", monospace';
    ctx.fillStyle = COLORS.starWhite;
    ctx.fillText(String(score), 16, 34);

    ctx.font = '12px "Share Tech Mono", monospace';
    ctx.fillStyle = COLORS.warningAmber;
    ctx.fillText('🪙 ' + coins, 16, 52);

    ctx.textAlign = 'right';
    ctx.font = '11px "Share Tech Mono", monospace';
    ctx.fillStyle = '#7C93C7';
    ctx.fillText("TO'LQIN", W - 56, 14);
    ctx.font = 'bold 19px "Share Tech Mono", monospace';
    ctx.fillStyle = COLORS.starWhite;
    ctx.fillText(String(wave), W - 56, 34);

    var barW = Math.min(W * 0.4, 190);
    var barX = W / 2 - barW / 2;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#7C93C7';
    ctx.font = '10px "Share Tech Mono", monospace';
    ctx.fillText('KORPUS', W / 2, 12);
    ctx.strokeStyle = COLORS.hudLine;
    ctx.strokeRect(barX, 19, barW, 11);
    var hpRatio = Math.max(player.hp, 0) / player.maxHp;
    ctx.fillStyle = hpRatio > 0.5 ? COLORS.playerCyan : (hpRatio > 0.2 ? COLORS.warningAmber : COLORS.enemyMagenta);
    ctx.fillRect(barX + 2, 21, (barW - 4) * hpRatio, 7);

    if (waveAnnounceTimer > 0) {
      ctx.save();
      ctx.globalAlpha = Math.min(waveAnnounceTimer, 1);
      ctx.textAlign = 'center';
      ctx.font = 'bold 32px Orbitron, sans-serif';
      ctx.fillStyle = COLORS.warningAmber;
      ctx.shadowColor = COLORS.warningAmber; ctx.shadowBlur = 20;
      ctx.fillText(waveAnnounceText, W / 2, H * 0.3);
      ctx.restore();
    }
  }

  /* ---------------- sound ---------------- */
  var audioCtx = null;
  function ensureAudio() {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      else if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch (e) { audioCtx = null; }
  }
  function beep(freqStart, freqEnd, dur, vol, waveType) {
    if (!audioCtx) return;
    try {
      var t0 = audioCtx.currentTime;
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = waveType || 'square';
      osc.frequency.setValueAtTime(freqStart, t0);
      if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, t0 + dur);
      gain.gain.setValueAtTime(vol, t0);
      gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
      osc.start(t0); osc.stop(t0 + dur + 0.02);
    } catch (e) { /* ignore */ }
  }
  function playSound(type) {
    if (type === 'shoot') beep(880, 220, 0.09, 0.06, 'square');
    else if (type === 'enemyShoot') beep(180, null, 0.12, 0.04, 'sawtooth');
    else if (type === 'explosion') beep(180, 30, 0.28, 0.12, 'sawtooth');
    else if (type === 'bigExplosion') beep(140, 20, 0.55, 0.18, 'sawtooth');
    else if (type === 'hit') beep(120, null, 0.15, 0.1, 'square');
    else if (type === 'powerup') beep(440, 880, 0.18, 0.08, 'sine');
    else if (type === 'gameover') beep(300, 60, 0.9, 0.15, 'sawtooth');
  }

  /* ---------------- input ---------------- */
  function getCanvasPos(clientX, clientY) {
    var rect = canvas.getBoundingClientRect();
    return { x: clientX - rect.left, y: clientY - rect.top };
  }
  canvas.addEventListener('touchstart', function (e) {
    e.preventDefault();
    var t = e.touches[0];
    var pos = getCanvasPos(t.clientX, t.clientY);
    player.targetX = pos.x; player.targetY = pos.y;
  }, { passive: false });
  canvas.addEventListener('touchmove', function (e) {
    e.preventDefault();
    var t = e.touches[0];
    var pos = getCanvasPos(t.clientX, t.clientY);
    player.targetX = pos.x; player.targetY = pos.y;
  }, { passive: false });
  canvas.addEventListener('mousemove', function (e) {
    var pos = getCanvasPos(e.clientX, e.clientY);
    player.targetX = pos.x; player.targetY = pos.y;
  });

  var keys = {};
  window.addEventListener('keydown', function (e) {
    keys[e.key] = true;
    if (e.key === 'Escape' && state === 'playing') togglePause();
  });
  window.addEventListener('keyup', function (e) { keys[e.key] = false; });
  function applyKeyboard(dt) {
    var speed = 340;
    if (keys['ArrowLeft'] || keys['a']) player.targetX -= speed * dt;
    if (keys['ArrowRight'] || keys['d']) player.targetX += speed * dt;
    if (keys['ArrowUp'] || keys['w']) player.targetY -= speed * dt;
    if (keys['ArrowDown'] || keys['s']) player.targetY += speed * dt;
    player.targetX = clamp(player.targetX, 0, W);
    player.targetY = clamp(player.targetY, 0, H);
  }

  /* ---------------- screens & state ---------------- */
  var state = 'start';
  var paused = false;

  function showScreen(id) {
    ['start-screen', 'skins-screen', 'upgrades-screen', 'gameover-screen', 'pause-screen'].forEach(function (sid) {
      document.getElementById(sid).style.display = 'none';
    });
    if (id) document.getElementById(id).style.display = 'flex';
  }

  function startGame() {
    state = 'playing'; paused = false;
    score = 0; runCoins = 0; wave = 1; waveTimer = 0; spawnTimer = 0; bossActive = false;
    waveAnnounceTimer = 1.6; waveAnnounceText = "TO'LQIN 1";
    enemies = []; playerBullets = []; enemyBullets = []; particles = []; powerUps = [];
    initPlayer();
    showScreen(null);
    document.getElementById('pause-btn').style.display = 'flex';
    ensureAudio();
  }
  function endGame() {
    state = 'gameover'; paused = false;
    if (score > best) best = score;
    document.getElementById('final-score').textContent = score;
    document.getElementById('final-best').textContent = best;
    document.getElementById('final-wave').textContent = wave;
    document.getElementById('final-coins').textContent = runCoins;
    document.getElementById('pause-btn').style.display = 'none';
    saveGame();
    showScreen('gameover-screen');
    playSound('gameover');
  }
  function goToMenu() {
    state = 'start'; paused = false;
    document.getElementById('pause-btn').style.display = 'none';
    renderCoinDisplays();
    showScreen('start-screen');
  }
  function togglePause() {
    if (state !== 'playing' || paused) return;
    paused = true;
    saveGame();
    showScreen('pause-screen');
  }

  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('retry-btn').addEventListener('click', startGame);
  document.getElementById('gameover-menu-btn').addEventListener('click', goToMenu);
  document.getElementById('pause-menu-btn').addEventListener('click', goToMenu);

  document.getElementById('skins-btn').addEventListener('click', function () {
    state = 'skins'; renderSkinGrid(); renderCoinDisplays(); showScreen('skins-screen');
  });
  document.getElementById('skins-back-btn').addEventListener('click', function () {
    state = 'start'; showScreen('start-screen');
  });
  document.getElementById('upgrades-btn').addEventListener('click', function () {
    state = 'upgrades'; renderUpgradeList(); renderCoinDisplays(); showScreen('upgrades-screen');
  });
  document.getElementById('upgrades-back-btn').addEventListener('click', function () {
    state = 'start'; showScreen('start-screen');
  });

  document.getElementById('pause-btn').addEventListener('click', togglePause);
  document.getElementById('resume-btn').addEventListener('click', function () {
    paused = false; showScreen(null);
  });
  document.getElementById('pause-restart-btn').addEventListener('click', startGame);

  document.addEventListener('visibilitychange', function () {
    if (document.hidden && state === 'playing' && !paused) togglePause();
  });

  /* ---------------- draw & loop ---------------- */
  function draw() {
    ctx.clearRect(0, 0, W, H);

    var grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, COLORS.spaceDeep); grad.addColorStop(0.6, COLORS.voidC); grad.addColorStop(1, '#020308');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = COLORS.nebula;
    ctx.beginPath(); ctx.ellipse(W * 0.2, H * 0.25, W * 0.35, H * 0.18, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(W * 0.8, H * 0.6, W * 0.3, H * 0.2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    drawStars();

    ctx.save();
    if (screenShake > 0) {
      var mag = screenShake * 10;
      ctx.translate((Math.random() - 0.5) * mag, (Math.random() - 0.5) * mag);
    }
    drawParticles();
    drawPowerUps();
    drawEnemies();
    drawBullets();
    drawPlayer();
    ctx.restore();

    if (state === 'playing') drawHUD();
  }

  var lastTime = 0;
  function gameLoop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    var dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;

    if (screenShake > 0) screenShake = Math.max(0, screenShake - dt);
    updateStars(dt);

    if (state === 'playing' && !paused) {
      applyKeyboard(dt);
      updatePlayer(dt);
      updateBullets(dt);
      updateEnemies(dt);
      updatePowerUps(dt);
      checkCollisions();
      cleanupOffscreen();
      updateWaveAndSpawning(dt);
      updateParticles(dt);
    }

    draw();
    requestAnimationFrame(gameLoop);
  }

  loadSave();
  initStars();
  initPlayer();
  renderCoinDisplays();
  requestAnimationFrame(gameLoop);
</script>
</body>
